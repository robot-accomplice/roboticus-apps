[package]
name = "eastern-philosophy"
version = "1.0.0"
description = "Contemplative philosophical dialogue rooted in Eastern wisdom traditions — Buddhism, Taoism, Confucianism, Hinduism, and Zen"
author = "Robot Accomplice AG"
license = "Apache-2.0"
min_roboticus_version = "0.11.1"
homepage = "https://roboticus.ai/apps/eastern-philosophy"
repository = "https://github.com/robot-accomplice/roboticus-apps"

[requirements]
min_model_params = "14B"
recommended_model = "ollama/qwen2.5:32b"
embedding_model = "nomic-embed-text"
delegation_enabled = true

[profile]
agent_name = "The Sage"
agent_id = "sage"
default_theme = "ai-purple"
